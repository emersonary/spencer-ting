# Spencer Ting SPA + API proxy. TLS via certbot (do not overwrite after certificates exist).

server {
    listen 80;
    listen [::]:80;
    server_name spencerting.solidia.app;

    root /var/www/spencer-ting;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    include /etc/nginx/snippets/spencer-ting-api-proxy.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
