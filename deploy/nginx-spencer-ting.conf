# Spencer Ting SPA + API proxy.
# Keep TLS blocks in-repo so deploys do not wipe certbot HTTPS.

server {
    server_name spencerting.solidia.app;

    root /var/www/spencer-ting;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;

    include /etc/nginx/snippets/spencer-ting-api-proxy.conf;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|mp4)$ {
        expires 7d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    listen [::]:443 ssl;
    listen 443 ssl;
    ssl_certificate /etc/letsencrypt/live/spencerting.solidia.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/spencerting.solidia.app/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = spencerting.solidia.app) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    listen [::]:80;
    server_name spencerting.solidia.app;
    return 404;
}
