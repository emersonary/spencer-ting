syntax = "proto3";

package property.v1;

option go_package = "github.com/emersonary/spencer-ting/api/gen/property/v1;propertyv1";

service PropertyService {
  rpc ListProperties(ListPropertiesRequest) returns (ListPropertiesResponse);
  rpc GetProperty(GetPropertyRequest) returns (GetPropertyResponse);
  rpc SearchProperties(SearchPropertiesRequest) returns (SearchPropertiesResponse);
  rpc SubmitInquiry(SubmitInquiryRequest) returns (SubmitInquiryResponse);
}

message Property {
  string id = 1;
  string slug = 2;
  string title = 3;
  string address = 4;
  string neighborhood = 5;
  string borough = 6;
  int64 price = 7;
  int32 bedrooms = 8;
  float bathrooms = 9;
  int32 sqft = 10;
  string property_type = 11;
  string status = 12;
  repeated string image_urls = 13;
  string description = 14;
  repeated string features = 15;
  bool featured = 16;
  bool luxury = 17;
  double lat = 18;
  double lng = 19;
  int32 year_built = 20;
  double monthly_hoa = 21;
  double monthly_taxes = 22;
}

message ListPropertiesRequest {
  string status = 1;
  bool featured_only = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message ListPropertiesResponse {
  repeated Property properties = 1;
  int32 total = 2;
}

message GetPropertyRequest {
  string id = 1;
  string slug = 2;
}

message GetPropertyResponse {
  Property property = 1;
}

message SearchPropertiesRequest {
  string query = 1;
  string neighborhood = 2;
  string borough = 3;
  string property_type = 4;
  int64 min_price = 5;
  int64 max_price = 6;
  int32 min_bedrooms = 7;
  int32 max_bedrooms = 8;
  bool luxury_only = 9;
  int32 limit = 10;
  int32 offset = 11;
}

message SearchPropertiesResponse {
  repeated Property properties = 1;
  int32 total = 2;
}

message SubmitInquiryRequest {
  string name = 1;
  string email = 2;
  string phone = 3;
  string property_id = 4;
  string message = 5;
  string locale = 6;
  string intent = 7;
}

message SubmitInquiryResponse {
  string inquiry_id = 1;
}
