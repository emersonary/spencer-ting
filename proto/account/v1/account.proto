syntax = "proto3";

package account.v1;

option go_package = "github.com/emersonary/appkit/accounts/gen/account/v1;accountv1";

service AccountService {
  rpc Login(LoginRequest) returns (SessionResponse);
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc GetSession(GetSessionRequest) returns (SessionResponse);
  rpc Logout(LogoutRequest) returns (LogoutResponse);
  rpc GetVerificationStatus(GetVerificationStatusRequest) returns (GetVerificationStatusResponse);
  rpc ResendVerificationEmail(ResendVerificationEmailRequest) returns (ResendVerificationEmailResponse);
  rpc RequestPasswordReset(RequestPasswordResetRequest) returns (RequestPasswordResetResponse);
  rpc ResetPassword(ResetPasswordRequest) returns (ResetPasswordResponse);
}

message Account {
  string id = 1;
  string email = 2;
  string first_name = 3;
  bool email_verified = 4;
  string avatar_url = 5;
  bool is_admin = 6;
  string last_name = 7;
}

message LoginRequest {
  string email = 1;
  string password = 2;
}

message RegisterRequest {
  string email = 1;
  string password = 2;
  string first_name = 3;
  string last_name = 4;
}

message GetSessionRequest {}

message LogoutRequest {}

message LogoutResponse {}

message RegisterResponse {
  bool verification_required = 1;
  SessionResponse session = 2;
}

message SessionResponse {
  string access_token = 1;
  Account account = 2;
}

message GetVerificationStatusRequest {
  string email = 1;
}

message GetVerificationStatusResponse {
  bool verified = 1;
}

message ResendVerificationEmailRequest {
  string email = 1;
}

message ResendVerificationEmailResponse {}

message RequestPasswordResetRequest {
  string email = 1;
}

message RequestPasswordResetResponse {}

message ResetPasswordRequest {
  string token = 1;
  string new_password = 2;
}

message ResetPasswordResponse {}
