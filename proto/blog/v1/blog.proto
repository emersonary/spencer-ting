syntax = "proto3";

package blog.v1;

option go_package = "github.com/emersonary/spencer-ting/api/gen/blog/v1;blogv1";

service BlogService {
  rpc ListPublishedPosts(ListPublishedPostsRequest) returns (ListPublishedPostsResponse);
  rpc GetPublishedPost(GetPublishedPostRequest) returns (PublishedPostResponse);
  rpc GetPreviewPost(GetPreviewPostRequest) returns (PublishedPostResponse);

  rpc ListAdminPosts(ListAdminPostsRequest) returns (ListAdminPostsResponse);
  rpc GetAdminPost(GetAdminPostRequest) returns (AdminPostResponse);
  rpc CreatePost(CreatePostRequest) returns (AdminPostResponse);
  rpc UpdatePost(UpdatePostRequest) returns (AdminPostResponse);
  rpc DeletePost(DeletePostRequest) returns (DeletePostResponse);
  rpc SetPostPublished(SetPostPublishedRequest) returns (PostSummary);
  rpc TriggerTranslation(TriggerTranslationRequest) returns (AdminPostResponse);
  rpc ListSocialPublications(ListSocialPublicationsRequest) returns (ListSocialPublicationsResponse);
}

message PostSummary {
  string id = 1;
  string slug = 2;
  string title = 3;
  string summary = 4;
  string post_type = 5;
  string content_kind = 6;
  string layout_type = 7;
  string publish_at = 8;
  string status = 9;
  bool published = 10;
  string video_url = 11;
  string video_provider = 12;
  string video_thumbnail_url = 13;
}

message PostTranslation {
  string language = 1;
  string title = 2;
  string summary = 3;
  string body_html = 4;
  string video_url = 5;
  string status = 6;
  string error_message = 7;
}

message SocialPublication {
  string id = 1;
  string platform_code = 2;
  string platform_name = 3;
  string language = 4;
  string status = 5;
  string caption = 6;
  string tracking_code = 7;
  string tracking_url = 8;
  string published_url = 9;
}

message ListPublishedPostsRequest {
  string project_id = 1;
  string language = 2;
}

message ListPublishedPostsResponse {
  repeated PostSummary posts = 1;
}

message GetPublishedPostRequest {
  string project_id = 1;
  string slug = 2;
  string language = 3;
}

message GetPreviewPostRequest {
  string project_id = 1;
  string id = 2;
  string language = 3;
}

message PublishedPostResponse {
  PostSummary post = 1;
  PostTranslation translation = 2;
  string body_html = 3;
}

message ListAdminPostsRequest {}

message ListAdminPostsResponse {
  repeated PostSummary posts = 1;
}

message GetAdminPostRequest {
  string id = 1;
}

message AdminPostResponse {
  PostSummary post = 1;
  repeated PostTranslation translations = 2;
  repeated SocialPublication social_publications = 3;
}

message CreatePostRequest {
  string title = 1;
  string summary = 2;
  string body_html = 3;
  string slug = 4;
  string post_type = 5;
  string content_kind = 6;
  string layout_type = 7;
  string publish_at = 8;
  string video_url = 9;
}

message UpdatePostRequest {
  string id = 1;
  string title = 2;
  string summary = 3;
  string body_html = 4;
  string slug = 5;
  string post_type = 6;
  string content_kind = 7;
  string layout_type = 8;
  string publish_at = 9;
  string video_url = 10;
  bool published = 11;
}

message DeletePostRequest {
  string id = 1;
}

message DeletePostResponse {}

message SetPostPublishedRequest {
  string id = 1;
  bool published = 2;
}

message TriggerTranslationRequest {
  string id = 1;
}

message ListSocialPublicationsRequest {
  string post_id = 1;
}

message ListSocialPublicationsResponse {
  repeated SocialPublication publications = 1;
}
